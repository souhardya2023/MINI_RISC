name: Verilog CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Syntax Check
        run: |
          # Compiles all .v files in src to check for syntax errors
          iverilog -o design_check src/*.v